<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Festinbjudan</title>
    
    <!-- Begränsa förhandsvisning i sociala medier (ingen bild) -->
    <meta property="og:title" content="Festinbjudan" />
    <meta property="og:description" content="Du är inbjuden!" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="postcard-scene" id="postcardScene">
        <!-- Bakgrund/bas (bild 2) -->
        <div class="postcard-base">
          <picture>
            <source media="(max-width: 768px)" srcset="/2mobil.jpg">
            <img src="/2.jpg" alt="Festbild" />
          </picture>
        </div>
        
        <!-- Övre locket som viks upp (bild 1) -->
        <div class="postcard-cover" id="postcardCover">
          <img src="/1.jpg" alt="Festinbjudan" />
          <div class="click-hint">Klicka för att öppna 👆</div>
        </div>
        
        <button class="close-btn" id="closeBtn">✕</button>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
