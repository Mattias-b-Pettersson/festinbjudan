<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Festinbjudan</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="postcard-wrapper">
        <!-- Framsida (Bild 1) -->
        <div class="postcard-front" id="postcardFront">
          <img src="/1.jpg" alt="Festinbjudan" />
          <div class="click-hint">Klicka för att öppna 👆</div>
        </div>

        <!-- Insida (Bild 2) -->
        <div class="postcard-inside" id="postcardInside">
          <img src="/2.jpg" alt="Festbild" />
          <button class="close-btn" id="closeBtn">✕</button>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
